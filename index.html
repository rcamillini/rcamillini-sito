<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roberto Camillini — Ingegnere Clinico · Esperto in Tecnologie per la Salute e Dispositivi Medici</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0f2340; --navy-mid: #1a3558; --accent: #2a6496;
    --gold: #b8860b; --gold-light: #d4a520;
    --text: #1a1a2e; --text-muted: #5a6a7a;
    --bg: #f8f9fb; --white: #ffffff; --border: #e0e8f0;
    --section-pad: 5rem 2rem;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(15,35,64,0.97); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2.5rem; height: 60px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .nav-brand { font-family: 'Lora', serif; color: #fff; font-size: 1rem; font-weight: 600; text-decoration: none; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover { color: var(--gold-light); }
  .nav-right { display: flex; align-items: center; gap: 1.2rem; }
  .lang-toggle { display: flex; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 2px; gap: 2px; }
  .lang-btn { background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.55); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; padding: 0.25rem 0.7rem; border-radius: 16px; transition: all 0.2s; }
  .lang-btn.active { background: var(--gold); color: #fff; }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
  .hamburger span { display: block; width: 22px; height: 2px; background: #fff; border-radius: 2px; }

  /* HERO */
  #hero {
    min-height: 100vh;
    background: linear-gradient(150deg, var(--navy) 0%, var(--navy-mid) 60%, #1e4d7a 100%);
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 6rem 2rem 4rem; position: relative; overflow: hidden;
  }
  #hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 70% 40%, rgba(42,100,150,0.25) 0%, transparent 60%); }
  .hero-inner { position: relative; max-width: 760px; }
  .hero-tag { display: inline-block; border: 1px solid rgba(184,134,11,0.5); color: var(--gold-light); font-size: 0.75rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.35rem 1rem; border-radius: 2px; margin-bottom: 1.8rem; }
  .hero-name { font-family: 'Lora', serif; font-size: clamp(2.2rem, 5vw, 3.4rem); color: #fff; font-weight: 600; line-height: 1.2; margin-bottom: 1rem; }
  .hero-title { font-size: clamp(0.95rem, 2vw, 1.1rem); color: rgba(255,255,255,0.7); font-weight: 300; margin-bottom: 1.8rem; letter-spacing: 0.02em; }
  .hero-divider { width: 48px; height: 2px; background: var(--gold-light); margin: 0 auto 1.8rem; }
  .hero-tagline { font-family: 'Lora', serif; font-style: italic; font-size: clamp(1rem, 2.2vw, 1.2rem); color: rgba(255,255,255,0.85); line-height: 1.6; margin-bottom: 2.5rem; }
  .hero-cta-row { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .btn { display: inline-block; text-decoration: none; padding: 0.75rem 2rem; border-radius: 3px; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.2s; }
  .btn-primary { background: var(--gold); color: #fff; border: 2px solid var(--gold); }
  .btn-primary:hover { background: var(--gold-light); border-color: var(--gold-light); }
  .btn-outline { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.4); }
  .btn-outline:hover { border-color: #fff; background: rgba(255,255,255,0.08); }

  /* SECTIONS */
  section { padding: var(--section-pad); }
  .section-inner { max-width: 960px; margin: 0 auto; }
  .section-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
  .section-title { font-family: 'Lora', serif; font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 600; color: var(--navy); margin-bottom: 1rem; line-height: 1.3; }
  .section-lead { font-size: 1.05rem; color: var(--text-muted); max-width: 680px; margin-bottom: 3rem; line-height: 1.8; }
  .divider-line { width: 40px; height: 3px; background: var(--gold); margin-bottom: 2.5rem; }

  /* BIO */
  #bio { background: var(--white); border-top: 1px solid var(--border); }
  .bio-layout {
    display: grid; grid-template-columns: 220px 1fr; gap: 3.5rem; align-items: start;
  }
  .bio-photo-wrap { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .bio-photo {
    width: 200px; height: 200px; border-radius: 50%;
    object-fit: cover;
    border: 4px solid var(--border);
    box-shadow: 0 4px 20px rgba(15,35,64,0.12);
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .bio-photo-placeholder {
    width: 200px; height: 200px; border-radius: 50%;
    border: 3px dashed var(--border);
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 0.78rem; text-align: center; gap: 0.5rem;
    cursor: pointer; transition: border-color 0.2s;
  }
  .bio-photo-placeholder:hover { border-color: var(--accent); }
  .bio-photo-placeholder span { font-size: 2rem; }
  .bio-upload-hint { font-size: 0.72rem; color: var(--text-muted); text-align: center; max-width: 180px; line-height: 1.5; }
  .bio-text { }
  .bio-text p { font-size: 0.975rem; color: var(--text); line-height: 1.85; margin-bottom: 1rem; }
  .bio-text p:last-child { margin-bottom: 0; }
  #photoInput { display: none; }

  @media (max-width: 700px) {
    .bio-layout { grid-template-columns: 1fr; gap: 2rem; }
    .bio-photo-wrap { align-items: center; }
  }

  /* PROFILO */
  #profilo { background: var(--bg); }
  .competenze-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(255px, 1fr)); gap: 1.5rem; }
  .competenza-card { border: 1px solid var(--border); border-top: 3px solid var(--accent); padding: 1.5rem 1.5rem 1.8rem; border-radius: 4px; background: var(--white); transition: box-shadow 0.2s, transform 0.2s; }
  .competenza-card:hover { box-shadow: 0 6px 24px rgba(15,35,64,0.1); transform: translateY(-2px); }
  .card-icon { font-size: 1.6rem; margin-bottom: 0.8rem; }
  .card-title { font-weight: 700; font-size: 0.95rem; color: var(--navy); margin-bottom: 0.6rem; }
  .card-text { font-size: 0.88rem; color: var(--text-muted); line-height: 1.7; }

  /* CONTENUTI */
  #contenuti { background: var(--white); }
  .tabs { display: flex; margin-bottom: 2rem; border-bottom: 2px solid var(--border); }
  .tab-btn { background: none; border: none; cursor: pointer; padding: 0.6rem 1.4rem; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; text-transform: uppercase; }
  .tab-btn.active { color: var(--navy); border-bottom-color: var(--gold); }
  .tab-btn:hover { color: var(--navy); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .post-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
  .post-card { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 1.6rem; transition: box-shadow 0.2s; }
  .post-card:hover { box-shadow: 0 4px 20px rgba(15,35,64,0.08); }
  .post-meta { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
  .post-title { font-family: 'Lora', serif; font-size: 1rem; font-weight: 600; color: var(--navy); margin-bottom: 0.5rem; line-height: 1.4; }
  .post-excerpt { font-size: 0.875rem; color: var(--text-muted); line-height: 1.7; }
  .post-date { font-size: 0.75rem; color: #aab; margin-top: 0.8rem; }
  .riflessione { background: var(--bg); border-left: 4px solid var(--gold); padding: 1.5rem 2rem; margin-bottom: 1.5rem; border-radius: 0 4px 4px 0; }
  .riflessione blockquote { font-family: 'Lora', serif; font-style: italic; font-size: 1.05rem; color: var(--navy); line-height: 1.7; }

  /* CONTATTI */
  #contatti { background: var(--navy); color: #fff; }
  #contatti .section-title { color: #fff; }
  #contatti .section-lead { color: rgba(255,255,255,0.65); }
  #contatti .divider-line { background: var(--gold-light); }
  .contatti-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; }
  .contatto-item { display: flex; align-items: flex-start; gap: 1rem; padding: 1.4rem 1.2rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; text-decoration: none; color: inherit; transition: background 0.2s; }
  .contatto-item:hover { background: rgba(255,255,255,0.1); }
  .contatto-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 0.1rem; }
  .contatto-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold-light); margin-bottom: 0.25rem; }
  .contatto-value { font-size: 0.9rem; color: rgba(255,255,255,0.85); word-break: break-all; white-space: nowrap; }

  footer { background: #08192e; color: rgba(255,255,255,0.35); text-align: center; padding: 1.5rem; font-size: 0.78rem; letter-spacing: 0.03em; }

  @media (max-width: 640px) {
    :root { --section-pad: 3.5rem 1.25rem; }
    .hamburger { display: flex; }
    .nav-links { display: none; flex-direction: column; gap: 0; position: absolute; top: 60px; left: 0; right: 0; background: var(--navy); padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .nav-links.open { display: flex; }
    .nav-links a { padding: 0.75rem 2.5rem; font-size: 0.9rem; }
    .tabs { overflow-x: auto; }
  }
</style>
</head>

let currentLang = 'it';

function renderBio(lang) {
  const paras = i18n[lang]['bio.paragraphs'];
  document.getElementById('bioText').innerHTML = paras.map(p => `<p>${p}</p>`).join('');
}

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === lang.toUpperCase()));
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = i18n[lang][key];
    if (val !== undefined) el.innerHTML = val;
  });
  renderBio(lang);
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}



document.getElementById('hamburger').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');
});

const sections = document.querySelectorAll('section[id]');
const navLinks = document.querySelectorAll('.nav-links a');
window.addEventListener('scroll', () => {
  let cur = '';
  sections.forEach(s => { if (window.scrollY >= s.offsetTop - 80) cur = s.id; });
  navLinks.forEach(a => { a.style.color = a.getAttribute('href') === '#' + cur ? 'var(--gold-light)' : ''; });
});

setLang('it');
</script>
